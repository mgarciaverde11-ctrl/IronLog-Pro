<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IRONLOG">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2964/2964514.png">
<title>IRONLOG 1.1.1</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a; --bg2: #111111; --bg3: #1a1a1a;
    --card: #161616; --border: #2a2a2a;
    --accent: #e8ff3c; --accent2: #ff3c3c;
    --text: #f0f0f0; --muted: #666; --muted2: #444;
    --radius: 14px; 
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans', sans-serif; overflow:hidden; }
  #app { display:flex; flex-direction:column; height:100dvh; }
  #header { padding: calc(var(--safe-top) + 10px) 20px 12px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
  #header h1 { font-family:'Bebas Neue', sans-serif; font-size:28px; letter-spacing:3px; color:var(--accent); }
  .subtitle { font-size:11px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
  #content { flex:1; overflow-y:auto; padding-bottom: calc(80px + var(--safe-bottom)); }
  #nav { position:fixed; bottom:0; left:0; right:0; height: calc(65px + var(--safe-bottom)); background: var(--bg2); border-top: 1px solid var(--border); display: flex; padding-top: 10px; z-index: 100; }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; background:none; border:none; color:var(--muted); }
  .nav-btn.active { color:var(--accent); }
  .nav-btn svg { width:22px; height:22px; margin-bottom:4px; }
  .nav-btn span { font-size:10px; }
  .page { display:none; padding:20px; }
  .page.active { display:block; }
  .sec-title { font-family:'Bebas Neue', sans-serif; font-size:22px; letter-spacing:2px; color:var(--accent); margin-bottom:16px; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:12px 20px; border-radius:10px; border:none; cursor:pointer; font-family:'DM Sans', sans-serif; font-weight:600; font-size:14px; }
  .btn-primary { background:var(--accent); color:#000; }
  .btn-danger { background:var(--accent2); color:#fff; }
  .btn-ghost { background:var(--bg3); color:var(--text); border:1px solid var(--border); }
  .btn-full { width:100%; margin-bottom:8px; }
  .btn-sm { padding:8px 12px; font-size:12px; }
  input, select { background:var(--bg3); border:1px solid var(--border); border-radius:10px; color:var(--text); padding:12px; width:100%; outline:none; }
  label { font-size:11px; color:var(--muted); text-transform:uppercase; display:block; margin-bottom:6px; }
  .timer-bar { background:var(--bg2); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; }
  .timer-display { font-family:'Bebas Neue', sans-serif; font-size:28px; color:var(--accent); letter-spacing:2px; }
  .ex-block { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:16px; overflow:hidden; }
  .ex-header { padding:14px 16px; background:rgba(255,255,255,0.03); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
  .ex-name { font-weight:600; font-size:15px; }
  .ex-body { padding:12px; }
  .set-row { display:grid; grid-template-columns:25px 1fr 1fr 40px; gap:8px; align-items:center; margin-bottom:8px; }
  .set-row.unilateral { grid-template-columns:25px 1fr 1fr 1fr 1fr 40px; }
  .set-num { font-size:11px; color:var(--muted); font-weight:bold; }
  .set-input { padding:8px; text-align:center; font-size:13px; }
  .set-label { font-size:9px; color:var(--muted); text-align:center; margin-bottom:2px; }
  .set-done { width:36px; height:36px; border-radius:8px; border:2px solid var(--border); background:none; display:flex; align-items:center; justify-content:center; }
  .set-done.checked { background:var(--accent); border-color:var(--accent); }
  .set-done.checked svg { stroke:#000; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity .2s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--bg2); border-radius:20px 20px 0 0; padding:24px 20px calc(30px + var(--safe-bottom)); width:100%; max-height:90dvh; overflow-y:auto; transform:translateY(100%); transition:transform .3s; }
  .modal-overlay.open .modal { transform:translateY(0); }
  .workout-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; position:relative; }
  .workout-details { display:none; margin-top:12px; border-top:1px solid var(--border); padding-top:12px; }
  .workout-card.expanded .workout-details { display:block; }
  .delete-btn { position:absolute; top:12px; right:12px; color:var(--muted2); font-size:20px; background:none; border:none; }
  .mini-label { font-size:10px; color:var(--accent); text-transform:uppercase; font-weight:bold; margin-bottom:4px; display:block;}
</style>
</head>
<body>

<div id="app">
  <div id="header">
    <div><h1>IRONLOG</h1><div class="subtitle">v1.1.1 Migradora</div></div>
  </div>

  <div class="timer-bar" id="timer-bar" style="display:none">
    <div class="timer-display" id="timer-display">00:00</div>
    <div style="flex:1"></div>
    <button class="btn btn-danger btn-sm" onclick="finishWorkout()">TERMINAR</button>
  </div>

  <div id="content">
    <div id="page-home" class="page active">
      <div id="active-workout-banner"></div>
      <button class="btn btn-primary btn-full" style="height:60px; font-size:18px;" onclick="showStartModal()">+ NUEVO ENTRENO</button>
      <div style="height:24px"></div>
      <div class="sec-title">Reciente</div>
      <div id="recent-list"></div>
    </div>
    <div id="page-workout" class="page">
      <div id="workout-header-edit" style="margin-bottom:15px"></div>
      <div id="workout-exercises"></div>
      <button class="btn btn-ghost btn-full" onclick="addExercisePrompt()">+ Añadir Ejercicio</button>
    </div>
    <div id="page-history" class="page">
      <div class="sec-title">Historial</div>
      <div id="history-list"></div>
    </div>
    <div id="page-templates" class="page">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;"><div class="sec-title" style="margin:0">Mis Splits</div><button class="btn btn-primary btn-sm" onclick="openTemplateModal()">+ Crear</button></div>
      <div id="templates-list"></div>
    </div>
    <div id="page-progress" class="page">
      <div class="sec-title">Progreso</div>
      <select id="progress-ex-select" onchange="renderProgressChart()"></select>
      <div class="card" style="margin-top:15px;"><canvas id="progress-chart"></canvas></div>
    </div>
  </div>

  <nav id="nav">
    <button class="nav-btn active" onclick="goTo('home')" id="nav-home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><span>Inicio</span></button>
    <button class="nav-btn" onclick="goTo('workout')" id="nav-workout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M3 8h3M18 8h3"/></svg><span>Entreno</span></button>
    <button class="nav-btn" onclick="goTo('history')" id="nav-history"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg><span>Historial</span></button>
    <button class="nav-btn" onclick="goTo('templates')" id="nav-templates"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Splits</span></button>
    <button class="nav-btn" onclick="goTo('progress')" id="nav-progress"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg><span>Progreso</span></button>
  </nav>
</div>

<div class="modal-overlay" id="modal-start"><div class="modal"><div class="sec-title">Empezar entreno</div><div id="start-templates-list"></div><div style="margin:15px 0; border-top:1px solid var(--border); padding-top:15px;"><input type="text" id="custom-workout-name" placeholder="Nombre (ej. Libre)"><button class="btn btn-primary btn-full" style="margin-top:10px" onclick="startWorkout(null)">ENTRENO LIBRE</button></div><button class="btn btn-ghost btn-full" onclick="closeModal('modal-start')">Cancelar</button></div></div>
<div class="modal-overlay" id="modal-template"><div class="modal"><div class="sec-title" id="template-modal-title">Nuevo Split</div><input type="text" id="tpl-name" placeholder="Nombre del Split"><div id="tpl-exercises" style="margin:15px 0"></div><button class="btn btn-ghost btn-full" onclick="addTplExField()">+ Añadir Ejercicio</button><button class="btn btn-primary btn-full" onclick="saveTemplate()">GUARDAR SPLIT</button><button class="btn btn-ghost btn-full" onclick="closeModal('modal-template')">Cancelar</button></div></div>
<div class="modal-overlay" id="modal-summary"><div class="modal"><div class="sec-title">¡Entreno Terminado!</div><div id="summary-data" style="text-align:center; margin:20px 0;"></div><button class="btn btn-primary btn-full" onclick="confirmSaveWorkout()">GUARDAR REGISTRO</button><button class="btn btn-ghost btn-full" onclick="closeModal('modal-summary')">Seguir entrenando</button><button class="btn btn-ghost btn-full" style="color:var(--accent2)" onclick="discardWorkout()">Descartar entreno</button></div></div>

<script>
// --- FUNCIÓN DE MIGRACIÓN CRÍTICA ---
function migrateData() {
    let raw = localStorage.getItem('ironlog_workouts');
    if (!raw) return;
    let data = JSON.parse(raw);
    let changed = false;

    data = data.map(w => {
        // Corregir fecha inválida (usa el ID como timestamp si la fecha falla)
        if (!w.date || w.date === "Invalid Date") {
            w.date = new Date(parseInt(w.id) || Date.now()).toISOString();
            changed = true;
        }
        // Corregir ejercicios "undefined"
        w.exercises = w.exercises.map(ex => {
            ex.sets = ex.sets.map(s => {
                // Si existe 'weight' y 'reps' (formato v1.0), pasarlo a 'wL' y 'rL' (formato v1.1)
                if (s.weight !== undefined && s.wL === undefined) {
                    s.wL = s.weight; s.rL = s.reps;
                    s.wR = ''; s.rR = '';
                    changed = true;
                }
                return s;
            });
            return ex;
        });
        return w;
    });

    if (changed) {
        localStorage.setItem('ironlog_workouts', JSON.stringify(data));
        console.log("Datos migrados a v1.1.1");
    }
}
migrateData(); // Ejecutar antes de cargar el estado

let state = {
  workouts: JSON.parse(localStorage.getItem('ironlog_workouts') || '[]'),
  templates: JSON.parse(localStorage.getItem('ironlog_templates') || '[]'),
  current: JSON.parse(localStorage.getItem('ironlog_current') || 'null'),
  timerIdx: null
};

window.onload = () => {
  if(state.current) { startTimerUI(); if(window.location.hash !== '#workout') goTo('workout'); }
  renderHome();
};

function goTo(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');
  if(page === 'home') renderHome();
  if(page === 'workout') renderWorkoutPage();
  if(page === 'history') renderHistory();
  if(page === 'templates') renderTemplates();
  if(page === 'progress') renderProgress();
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function sync() {
  localStorage.setItem('ironlog_workouts', JSON.stringify(state.workouts));
  localStorage.setItem('ironlog_templates', JSON.stringify(state.templates));
  localStorage.setItem('ironlog_current', JSON.stringify(state.current));
}

function showStartModal() {
  const list = document.getElementById('start-templates-list');
  list.innerHTML = state.templates.map(t => `<button class="btn btn-ghost btn-full" onclick="startWorkout('${t.id}')">${t.name}</button>`).join('');
  openModal('modal-start');
}

function startWorkout(templateId) {
  let name = document.getElementById('custom-workout-name').value || "Entreno Libre";
  let exercises = [];
  if(templateId) {
    const t = state.templates.find(tpl => tpl.id === templateId);
    name = t.name;
    exercises = t.exercises.map(ex => ({
      name: ex.name, unilateral: ex.unilateral || false,
      sets: Array.from({length: ex.setsCount || 3}, () => ({ wL: '', rL: '', wR: '', rR: '', done: false }))
    }));
  }
  state.current = { id: Date.now(), name: name, startTime: Date.now(), exercises: exercises };
  sync(); closeModal('modal-start'); startTimerUI(); goTo('workout');
}

function startTimerUI() {
  document.getElementById('timer-bar').style.display = 'flex';
  if(state.timerIdx) clearInterval(state.timerIdx);
  state.timerIdx = setInterval(() => {
    if(!state.current) return;
    const diff = Math.floor((Date.now() - state.current.startTime) / 1000);
    const m = Math.floor(diff/60); const s = diff%60;
    document.getElementById('timer-display').innerText = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function renderWorkoutPage() {
  const container = document.getElementById('workout-exercises');
  if(!state.current) { container.innerHTML = `<div style="text-align:center; color:var(--muted); margin-top:40px;">No hay entreno activo</div>`; document.getElementById('workout-header-edit').innerHTML = ""; return; }
  document.getElementById('workout-header-edit').innerHTML = `<input type="text" value="${state.current.name}" oninput="state.current.name=this.value;sync()" style="font-family:'Bebas Neue'; font-size:24px; color:var(--accent); background:none; border:none; padding:0;">`;
  container.innerHTML = state.current.exercises.map((ex, ei) => `
    <div class="ex-block">
      <div class="ex-header"><input type="text" value="${ex.name}" oninput="state.current.exercises[${ei}].name=this.value;sync()" class="ex-name" style="background:none; border:none; color:var(--text); width:70%"><button onclick="deleteExFromWorkout(${ei})" style="background:none; border:none; color:var(--accent2)">×</button></div>
      <div class="ex-body">
        ${ex.unilateral ? `<div class="set-row unilateral" style="margin-bottom:5px"><div></div><div class="set-label">Kg I</div><div class="set-label">Rep I</div><div class="set-label">Kg D</div><div class="set-label">Rep D</div><div></div></div>` : ''}
        ${ex.sets.map((s, si) => `
          <div class="set-row ${ex.unilateral ? 'unilateral' : ''}">
            <div class="set-num">${si+1}</div>
            <input type="number" class="set-input" value="${s.wL}" placeholder="kg" oninput="updateSet(${ei},${si},'wL',this.value)">
            <input type="number" class="set-input" value="${s.rL}" placeholder="reps" oninput="updateSet(${ei},${si},'rL',this.value)">
            ${ex.unilateral ? `<input type="number" class="set-input" value="${s.wR}" placeholder="kg" oninput="updateSet(${ei},${si},'wR',this.value)"> <input type="number" class="set-input" value="${s.rR}" placeholder="reps" oninput="updateSet(${ei},${si},'rR',this.value)">` : ''}
            <button class="set-done ${s.done ? 'checked' : ''}" onclick="toggleSet(${ei},${si})"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg></button>
          </div>`).join('')}
        <button class="btn btn-ghost btn-sm btn-full" style="margin-top:10px" onclick="addSetToEx(${ei})">+ Serie</button>
      </div>
    </div>`).join('');
}

function updateSet(ei, si, field, val) { state.current.exercises[ei].sets[si][field] = val; sync(); }
function toggleSet(ei, si) { state.current.exercises[ei].sets[si].done = !state.current.exercises[ei].sets[si].done; sync(); renderWorkoutPage(); }
function addSetToEx(ei) { state.current.exercises[ei].sets.push({wL:'', rL:'', wR:'', rR:'', done:false}); sync(); renderWorkoutPage(); }
function deleteExFromWorkout(ei) { if(confirm("¿Quitar ejercicio?")) { state.current.exercises.splice(ei, 1); sync(); renderWorkoutPage(); } }
function addExercisePrompt() { const name = prompt("Nombre:"); if(name) { const uni = confirm("¿Unilateral?"); state.current.exercises.push({ name, unilateral: uni, sets: [{wL:'', rL:'', wR:'', rR:'', done:false}] }); sync(); renderWorkoutPage(); } }

function finishWorkout() {
  const vol = calculateVolume(state.current.exercises);
  document.getElementById('summary-data').innerHTML = `<div style="font-size:32px; font-family:'Bebas Neue'; color:var(--accent)">${vol} KG</div><div style="font-size:12px; color:var(--muted)">VOLUMEN TOTAL</div>`;
  openModal('modal-summary');
}

function calculateVolume(exs) {
  return exs.reduce((acc, ex) => acc + ex.sets.filter(s => s.done).reduce((sAcc, s) => sAcc + ((parseFloat(s.wL)||0)*(parseInt(s.rL)||0)) + ((parseFloat(s.wR)||0)*(parseInt(s.rR)||0)), 0), 0);
}

function confirmSaveWorkout() {
  const diff = Math.floor((Date.now() - state.current.startTime) / 1000);
  state.current.duration = `${Math.floor(diff/60)} min`;
  state.workouts.push(state.current); state.current = null; sync();
  clearInterval(state.timerIdx); document.getElementById('timer-bar').style.display = 'none'; closeModal('modal-summary'); goTo('home');
}

function discardWorkout() { if(confirm("¿Descartar?")) { state.current = null; sync(); clearInterval(state.timerIdx); document.getElementById('timer-bar').style.display = 'none'; closeModal('modal-summary'); goTo('home'); } }

// TEMPLATES
let editingTemplateId = null;
function openTemplateModal(id = null) {
  editingTemplateId = id; const container = document.getElementById('tpl-exercises'); container.innerHTML = "";
  if(id) {
    const t = state.templates.find(tpl => tpl.id === id); document.getElementById('tpl-name').value = t.name;
    document.getElementById('template-modal-title').innerText = "Editar Split"; t.exercises.forEach(ex => addTplExField(ex.name, ex.setsCount, ex.unilateral));
  } else { document.getElementById('tpl-name').value = ""; document.getElementById('template-modal-title').innerText = "Nuevo Split"; addTplExField(); }
  openModal('modal-template');
}
function addTplExField(name = '', sets = 3, uni = false) {
  const div = document.createElement('div'); div.className = "card"; div.style = "margin-bottom:10px; padding:12px; border:1px solid var(--border)";
  div.innerHTML = `<input type="text" placeholder="Ejercicio" class="tpl-ex-name" value="${name}" style="margin-bottom:8px"><div style="display:flex; gap:10px; align-items:center"><input type="number" placeholder="Series" class="tpl-ex-sets" value="${sets}" style="width:70px"><label style="margin:0; flex:1; display:flex; align-items:center; gap:5px"><input type="checkbox" class="tpl-ex-uni" ${uni ? 'checked' : ''} style="width:auto"> Unilateral</label><button onclick="this.parentElement.parentElement.remove()" style="color:var(--accent2); background:none; border:none; font-size:18px">×</button></div>`;
  document.getElementById('tpl-exercises').appendChild(div);
}
function saveTemplate() {
  const name = document.getElementById('tpl-name').value; const exDivs = document.querySelectorAll('#tpl-exercises .card');
  const exercises = Array.from(exDivs).map(div => ({ name: div.querySelector('.tpl-ex-name').value, setsCount: parseInt(div.querySelector('.tpl-ex-sets').value) || 3, unilateral: div.querySelector('.tpl-ex-uni').checked })).filter(ex => ex.name);
  if(!name || exercises.length === 0) return;
  if(editingTemplateId) { const idx = state.templates.findIndex(t => t.id === editingTemplateId); state.templates[idx] = { id: editingTemplateId, name, exercises }; }
  else { state.templates.push({ id: Date.now().toString(), name, exercises }); }
  sync(); closeModal('modal-template'); renderTemplates();
}

function renderHome() {
  const banner = document.getElementById('active-workout-banner');
  if(state.current) { banner.innerHTML = `<div class="card" style="border-color:var(--accent); background:rgba(232,255,60,0.05); margin-bottom:20px"><div style="color:var(--accent); font-weight:bold; font-size:13px">ENTRENO EN CURSO</div><div style="font-size:18px; margin:4px 0">${state.current.name}</div><button class="btn btn-primary btn-sm" onclick="goTo('workout')">CONTINUAR</button></div>`; } else { banner.innerHTML = ""; }
  const recent = state.workouts.slice(-3).reverse();
  document.getElementById('recent-list').innerHTML = recent.map(w => workoutCardHTML(w)).join('') || '<div style="color:var(--muted)">Sin entrenos aún.</div>';
}

function renderTemplates() {
  document.getElementById('templates-list').innerHTML = state.templates.map(t => `<div class="card"><div style="display:flex; justify-content:space-between"><span style="font-family:'Bebas Neue'; font-size:20px; color:var(--accent)">${t.name}</span><div><button onclick="openTemplateModal('${t.id}')" style="background:none; border:none; color:var(--muted); margin-right:10px">Edit</button><button onclick="deleteTemplate('${t.id}')" style="background:none; border:none; color:var(--accent2)">×</button></div></div><div style="font-size:12px; color:var(--muted); margin:8px 0">${t.exercises.length} ejercicios</div><button class="btn btn-primary btn-full btn-sm" onclick="startWorkout('${t.id}')">EMPEZAR</button></div>`).join('');
}

function renderHistory() { document.getElementById('history-list').innerHTML = [...state.workouts].reverse().map(w => workoutCardHTML(w)).join(''); }

function workoutCardHTML(w) {
  const vol = calculateVolume(w.exercises);
  const dateStr = new Date(w.date).toLocaleDateString();
  return `<div class="workout-card"><button class="delete-btn" onclick="deleteHistoryItem(${w.id})">×</button><div onclick="this.parentElement.classList.toggle('expanded')"><div style="font-size:10px; color:var(--muted)">${dateStr}</div><div style="font-family:'Bebas Neue'; font-size:18px">${w.name}</div><div style="display:flex; gap:15px; margin-top:8px"><div><div style="font-size:14px; font-weight:bold">${vol}kg</div><div style="font-size:9px; color:var(--muted)">VOL</div></div><div><div style="font-size:14px; font-weight:bold">${w.duration || '--'}</div><div style="font-size:9px; color:var(--muted)">TIEMPO</div></div></div><div class="workout-details">${w.exercises.map(ex => `<div style="margin-bottom:8px"><div class="mini-label">${ex.name}</div>${ex.sets.filter(s => s.done).map(s => `<div style="font-size:12px; color:var(--muted)">${ex.unilateral ? `I: ${s.wL}kg x ${s.rL} | D: ${s.wR}kg x ${s.rR}` : `${s.wL}kg x ${s.rL}`}</div>`).join('')}</div>`).join('')}</div></div></div>`;
}

function deleteHistoryItem(id) { if(confirm("¿Eliminar?")) { state.workouts = state.workouts.filter(w => w.id !== id); sync(); renderHistory(); renderHome(); } }
function renderProgress() {
  const sel = document.getElementById('progress-ex-select');
  const allExNames = [...new Set(state.workouts.flatMap(w => w.exercises.map(e => e.name)))];
  sel.innerHTML = allExNames.map(n => `<option value="${n}">${n}</option>`).join('');
  renderProgressChart();
}
function renderProgressChart() {
  const name = document.getElementById('progress-ex-select').value; if(!name) return;
  const data = state.workouts.map(w => { const ex = w.exercises.find(e => e.name === name); if(!ex) return null; return { d: new Date(w.date).toLocaleDateString(), v: calculateVolume([ex]) }; }).filter(x => x && x.v > 0);
  if(window.myChart) window.myChart.destroy();
  window.myChart = new Chart(document.getElementById('progress-chart'), { type: 'line', data: { labels: data.map(x => x.d), datasets: [{ label: 'Volumen', data: data.map(x => x.v), borderColor: '#e8ff3c', tension: 0.3 }] }, options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#222' } }, x: { grid: { display: false } } } } });
}
</script>
</body>
</html>
