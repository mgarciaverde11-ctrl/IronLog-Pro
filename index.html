<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>IRONLOG v1.2</title>
    <style>
        /* ESTÉTICA ORIGINAL v1.1.1 MANTENIDA INTACTA */
        :root {
            --bg-primary: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2a2a2a;
            --accent: #ffcc00;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --border: #333333;
            --success: #2ecc71;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding-bottom: 80px; padding-top: env(safe-area-inset-top); }

        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background-color: var(--bg-card); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 calc(12px + env(safe-area-inset-bottom)) 0; z-index: 100; }
        .nav-btn { background: none; border: none; color: var(--text-muted); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; width: 25%; }
        .nav-btn.active { color: var(--accent); font-weight: bold; }
        .nav-btn span { font-size: 20px; }

        .view { display: none; padding: 16px; max-width: 600px; margin: 0 auto; }
        .view.active { display: block; }
        h2 { font-size: 24px; margin-bottom: 16px; }

        .card { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .btn { background-color: var(--accent); color: #000; border: none; border-radius: 6px; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; display: block; width: 100%; text-align: center; margin-bottom: 8px; }
        .btn-secondary { background-color: var(--bg-input); color: var(--text-main); border: 1px solid var(--border); }
        .btn-danger { background-color: #e74c3c; color: white; }
        .btn-mini { background-color: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 6px; border-radius: 4px; font-size: 12px; cursor: pointer; }

        .timer-banner { background-color: var(--bg-card); border-bottom: 1px solid var(--border); padding: 10px; text-align: center; font-weight: bold; color: var(--accent); font-size: 16px; display: none; }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gap-2 { display: flex; gap: 8px; align-items: center; }
        
        .input-text { background: none; border: none; color: var(--text-main); font-size: 18px; font-weight: bold; width: 60%; border-bottom: 1px solid transparent; }
        .input-text:focus { border-bottom-color: var(--accent); outline: none; }
        
        .set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .input-box { display: flex; flex-direction: column; flex: 1; }
        .input-box label { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
        input[type="number"], input[type="text"], select { background-color: var(--bg-input); border: 1px solid var(--border); color: var(--text-main); padding: 8px; border-radius: 4px; font-size: 14px; width: 100%; text-align: center; }
        input:focus, select:focus { outline: none; border-color: var(--accent); }

        .check-btn { width: 40px; height: 40px; border-radius: 4px; border: 1px solid var(--border); background-color: var(--bg-input); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .check-btn.done { background-color: var(--success); border-color: var(--success); color: #000; }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 200; display: none; }
        .modal-content { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }

        /* NUEVOS ESTILOS ESTRICTAMENTE FUNCIONALES (v1.2) */
        .micro-history-panel { background-color: var(--bg-input); border-radius: 4px; padding: 8px; margin: 8px 0; font-size: 12px; border-left: 3px solid var(--accent); display: none; }
        .micro-history-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); color: var(--text-muted); }
        .micro-history-item:last-child { border-bottom: none; }
        
        .native-chart-container { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
        .chart-row { display: flex; align-items: center; gap: 10px; }
        .chart-label { width: 70px; font-size: 11px; color: var(--text-muted); text-align: right; }
        .chart-track { flex-grow: 1; background: var(--bg-input); border-radius: 4px; height: 24px; position: relative; }
        .chart-bar { background: var(--accent); height: 100%; width: 0%; border-radius: 4px; transition: width 0.3s; }
        .chart-value { position: absolute; right: 8px; top: 4px; font-size: 12px; font-weight: bold; color: var(--text-main); }
    </style>
</head>
<body>

    <div id="timerBanner" class="timer-banner">⏱️ 00:00:00</div>

    <div id="viewTemplates" class="view active">
        <h2>Rutinas</h2>
        <div id="templatesList"></div>
        <button class="btn btn-secondary" onclick="openTemplateModal()">＋ Crear Rutina</button>
    </div>

    <div id="viewActive" class="view">
        <div class="flex-between" style="margin-bottom:16px;">
            <input type="text" id="activeWorkoutName" class="input-text" onchange="saveActiveWorkout()">
            <div id="activeClock" style="font-weight:bold; color:var(--accent);">00:00</div>
        </div>
        <div id="activeExercisesContainer"></div>
        <button class="btn btn-secondary" onclick="addExerciseToActive()">＋ Ejercicio Libre</button>
        <button class="btn" onclick="finishWorkout()">🏁 Terminar Entreno</button>
        <button class="btn btn-danger" onclick="cancelWorkout()">Cancelar</button>
    </div>

    <div id="viewHistory" class="view">
        <h2>Historial</h2>
        <div id="historyContainer"></div>
    </div>

    <div id="viewProgress" class="view">
        <h2>Progreso</h2>
        <div style="display:flex; gap:8px; margin-bottom:16px;">
            <select id="progExSelect" onchange="drawNativeChart()" style="flex:1;"></select>
            <select id="progMetricSelect" onchange="drawNativeChart()" style="flex:1;">
                <option value="top">Peso Máximo</option>
                <option value="1rm">1RM Estimado</option>
            </select>
        </div>
        <div class="card">
            <div id="nativeChart" class="native-chart-container"></div>
        </div>
    </div>

    <nav class="navbar">
        <button class="nav-btn active" id="navTemplates" onclick="switchView('Templates')"><span>📋</span>Rutinas</button>
        <button class="nav-btn" id="navActive" onclick="switchView('Active')"><span>⚡</span>Entrenar</button>
        <button class="nav-btn" id="navHistory" onclick="switchView('History')"><span>📜</span>Historial</button>
        <button class="nav-btn" id="navProgress" onclick="switchView('Progress')"><span>📈</span>Progreso</button>
    </nav>

    <div id="templateModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Plantilla</h3>
            <input type="text" id="modalName" placeholder="Nombre de rutina">
            <div id="modalExList" style="max-height:250px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;"></div>
            <button class="btn btn-secondary" onclick="addExToModal()">＋ Ejercicio</button>
            <div class="flex-between" style="gap:8px;">
                <button class="btn btn-danger" onclick="closeModal()">Cancelar</button>
                <button class="btn" onclick="saveTemplate()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let splits = [], historyData = [], activeWk = null, timerInt = null, editId = null;

        // 1. MIGRACIÓN (Intacta)
        function runMigration() {
            let h = JSON.parse(localStorage.getItem('ironlog_history') || '[]');
            let changed = false;
            h.forEach(w => {
                if(!w.date || w.date.includes("Invalid")) { w.date = new Date().toLocaleDateString('es-ES'); changed = true; }
                if(w.exercises) w.exercises.forEach(e => {
                    if(e.sets) e.sets.forEach(s => {
                        if(s.weight !== undefined && s.wL === undefined) {
                            s.wL = s.weight; s.rL = s.reps; s.wR = s.weight; s.rR = s.reps;
                            delete s.weight; delete s.reps; changed = true;
                        }
                    });
                });
            });
            if(changed) localStorage.setItem('ironlog_history', JSON.stringify(h));
        }

        window.onload = () => {
            runMigration();
            splits = JSON.parse(localStorage.getItem('ironlog_splits')) || [];
            historyData = JSON.parse(localStorage.getItem('ironlog_history')) || [];
            renderTemplates(); renderHistory(); loadActive(); updateProgressSelectors();
        };

        function switchView(v) {
            document.querySelectorAll('.view, .nav-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('view'+v).classList.add('active');
            document.getElementById('nav'+v).classList.add('active');
            if(v === 'Progress') { updateProgressSelectors(); drawNativeChart(); }
        }

        // --- RUTINAS ---
        function renderTemplates() {
            const c = document.getElementById('templatesList'); c.innerHTML = '';
            splits.forEach(s => {
                c.innerHTML += `
                    <div class="card">
                        <div class="flex-between" style="margin-bottom:8px;">
                            <strong>${s.name}</strong>
                            <div class="gap-2">
                                <button class="btn-mini" style="background:var(--accent);color:#000;" onclick="startWorkout('${s.id}')">Entrenar</button>
                                <button class="btn-mini" onclick="openTemplateModal('${s.id}')">Editar</button>
                                <button class="btn-mini" style="color:#e74c3c;" onclick="deleteTemplate('${s.id}')">✕</button>
                            </div>
                        </div>
                        <p style="font-size:12px;color:var(--text-muted)">${s.exercises.map(e => e.name).join(', ')}</p>
                    </div>`;
            });
        }

        function openTemplateModal(id = null) {
            editId = id; document.getElementById('modalName').value = '';
            const list = document.getElementById('modalExList'); list.innerHTML = '';
            if(id) {
                const s = splits.find(x => x.id === id);
                document.getElementById('modalName').value = s.name;
                s.exercises.forEach(e => addExToModal(e.name, e.isUnilateral));
            } else addExToModal();
            document.getElementById('templateModal').style.display = 'flex';
        }

        function addExToModal(name = '', isUni = false) {
            const list = document.getElementById('modalExList');
            const div = document.createElement('div');
            div.className = 'flex-between gap-2 modal-row';
            div.style.background = 'var(--bg-input)'; div.style.padding = '8px'; div.style.borderRadius = '4px';
            div.innerHTML = `
                <input type="text" class="mod-name" value="${name}" placeholder="Ejercicio" style="flex:2; padding:4px;">
                <select class="mod-uni" style="flex:1; padding:4px;">
                    <option value="false" ${!isUni?'selected':''}>Normal</option>
                    <option value="true" ${isUni?'selected':''}>Uni</option>
                </select>
                <button class="btn-mini" onclick="moveModalRow(this, -1)">▲</button>
                <button class="btn-mini" onclick="moveModalRow(this, 1)">▼</button>
                <button class="btn-mini" style="color:#e74c3c;" onclick="this.parentElement.remove()">✕</button>
            `;
            list.appendChild(div);
        }

        function moveModalRow(btn, dir) {
            const row = btn.parentElement;
            const container = row.parentElement;
            const rows = Array.from(container.children);
            const idx = rows.indexOf(row);
            if(idx + dir >= 0 && idx + dir < rows.length) {
                if(dir === -1) container.insertBefore(row, rows[idx-1]);
                else container.insertBefore(rows[idx+1], row);
            }
        }

        function saveTemplate() {
            const name = document.getElementById('modalName').value;
            if(!name) return;
            let ex = [];
            document.querySelectorAll('.modal-row').forEach(r => {
                const n = r.querySelector('.mod-name').value;
                if(n) ex.push({ name: n, isUnilateral: r.querySelector('.mod-uni').value === 'true' });
            });
            if(editId) { const s = splits.find(x => x.id === editId); s.name = name; s.exercises = ex; }
            else splits.push({ id: Date.now().toString(), name, exercises: ex });
            localStorage.setItem('ironlog_splits', JSON.stringify(splits));
            closeModal(); renderTemplates();
        }
        function closeModal() { document.getElementById('templateModal').style.display = 'none'; }
        function deleteTemplate(id) { if(confirm('¿Borrar?')) { splits = splits.filter(s => s.id !== id); localStorage.setItem('ironlog_splits', JSON.stringify(splits)); renderTemplates(); } }

        // --- RELOJ ---
        function startTimer(st) {
            clearInterval(timerInt);
            document.getElementById('timerBanner').style.display = 'block';
            timerInt = setInterval(() => {
                const diff = Date.now() - st;
                const s = Math.floor((diff/1000)%60).toString().padStart(2,'0');
                const m = Math.floor((diff/60000)%60).toString().padStart(2,'0');
                const h = Math.floor((diff/3600000)).toString().padStart(2,'0');
                document.getElementById('timerBanner').innerText = `⏱️ ${h}:${m}:${s}`;
                document.getElementById('activeClock').innerText = `${m}:${s}`;
            }, 1000);
        }

        // --- ENTRENO ACTIVO ---
        function startWorkout(id) {
            const t = splits.find(x => x.id === id);
            activeWk = { id: Date.now().toString(), name: t.name, start: Date.now(), exercises: t.exercises.map(e => ({ name: e.name, isUnilateral: e.isUnilateral, sets: [{wL:'', rL:'', wR:'', rR:'', done:false}] })) };
            saveActiveWorkout(); loadActive(); switchView('Active');
        }
        function loadActive() {
            const saved = localStorage.getItem('ironlog_active_workout');
            if(saved) activeWk = JSON.parse(saved);
            if(!activeWk) { document.getElementById('activeExercisesContainer').innerHTML = ''; document.getElementById('timerBanner').style.display = 'none'; return; }
            
            document.getElementById('activeWorkoutName').value = activeWk.name;
            startTimer(activeWk.start);
            renderActive();
        }
        function saveActiveWorkout() {
            if(activeWk) {
                activeWk.name = document.getElementById('activeWorkoutName').value;
                localStorage.setItem('ironlog_active_workout', JSON.stringify(activeWk));
            } else localStorage.removeItem('ironlog_active_workout');
        }

        function renderActive() {
            const c = document.getElementById('activeExercisesContainer'); c.innerHTML = '';
            activeWk.exercises.forEach((ex, i) => {
                let html = `
                <div class="card">
                    <div class="flex-between" style="margin-bottom:8px;">
                        <input type="text" class="input-text" value="${ex.name}" onchange="updateExName(${i}, this.value)">
                        <div class="gap-2">
                            <button class="btn-mini" onclick="toggleHistory(${i}, '${ex.name}')">🕒</button>
                            <button class="btn-mini" onclick="moveActiveEx(${i}, -1)">▲</button>
                            <button class="btn-mini" onclick="moveActiveEx(${i}, 1)">▼</button>
                            <button class="btn-mini" style="color:#e74c3c;" onclick="delActiveEx(${i})">✕</button>
                        </div>
                    </div>
                    <div id="histPanel-${i}" class="micro-history-panel"></div>`;
                
                ex.sets.forEach((set, sIdx) => {
                    html += `<div class="set-row"><span style="width:20px;font-size:12px;color:var(--text-muted);">${sIdx+1}</span>`;
                    if(ex.isUnilateral) {
                        html += `<div class="input-box"><label>Kg I</label><input type="number" step="any" value="${set.wL}" onchange="updSet(${i},${sIdx},'wL',this.value)"></div>
                                 <div class="input-box"><label>Rep I</label><input type="number" value="${set.rL}" onchange="updSet(${i},${sIdx},'rL',this.value)"></div>
                                 <div class="input-box"><label>Kg D</label><input type="number" step="any" value="${set.wR}" onchange="updSet(${i},${sIdx},'wR',this.value)"></div>
                                 <div class="input-box"><label>Rep D</label><input type="number" value="${set.rR}" onchange="updSet(${i},${sIdx},'rR',this.value)"></div>`;
                    } else {
                        html += `<div class="input-box"><label>Kg</label><input type="number" step="any" value="${set.wL}" onchange="updSet(${i},${sIdx},'wL',this.value)"></div>
                                 <div class="input-box"><label>Reps</label><input type="number" value="${set.rL}" onchange="updSet(${i},${sIdx},'rL',this.value)"></div>`;
                    }
                    html += `<button class="check-btn ${set.done?'done':''}" onclick="toggleDone(${i},${sIdx})">✓</button></div>`;
                });
                html += `<button class="btn-secondary" style="width:100%; padding:6px; border-radius:4px; font-size:12px; margin-top:8px;" onclick="addSet(${i})">＋ Serie</button></div>`;
                c.innerHTML += html;
            });
        }

        // FLECHAS ENTRENO
        function moveActiveEx(idx, dir) {
            if(idx + dir < 0 || idx + dir >= activeWk.exercises.length) return;
            const temp = activeWk.exercises[idx];
            activeWk.exercises[idx] = activeWk.exercises[idx+dir];
            activeWk.exercises[idx+dir] = temp;
            saveActiveWorkout(); renderActive();
        }

        // MICRO HISTORIAL
        function toggleHistory(idx, name) {
            const p = document.getElementById(`histPanel-${idx}`);
            if(p.style.display === 'block') { p.style.display = 'none'; return; }
            
            let matches = [];
            for(let i = historyData.length - 1; i >= 0; i--) {
                let w = historyData[i];
                let e = w.exercises.find(x => x.name.toLowerCase() === name.toLowerCase());
                if(e) { matches.push({ d: w.date, s: e.sets, u: e.isUnilateral }); if(matches.length === 3) break; }
            }
            if(matches.length === 0) p.innerHTML = 'Sin historial previo.';
            else {
                p.innerHTML = '<div style="font-weight:bold;margin-bottom:4px;color:#fff;">Últimas 3 sesiones:</div>' + matches.map(m => {
                    let sStr = m.s.map(s => m.u ? `[I:${s.wL}x${s.rL}/D:${s.wR}x${s.rR}]` : `${s.wL}kg x ${s.rL}`).join(' | ');
                    return `<div class="micro-history-item"><span style="color:var(--accent)">${m.d}</span> <span>${sStr}</span></div>`;
                }).join('');
            }
            p.style.display = 'block';
        }

        function updateExName(i, v) { activeWk.exercises[i].name = v; saveActiveWorkout(); }
        function updSet(i, s, f, v) { activeWk.exercises[i].sets[s][f] = v; saveActiveWorkout(); }
        function addSet(i) {
            let sets = activeWk.exercises[i].sets; let l = sets[sets.length-1];
            sets.push({ wL:l?l.wL:'', rL:l?l.rL:'', wR:l?l.wR:'', rR:l?l.rR:'', done:false });
            saveActiveWorkout(); renderActive();
        }
        function addExerciseToActive() {
            activeWk.exercises.push({ name: 'Nuevo', isUnilateral: false, sets: [{wL:'',rL:'',wR:'',rR:'',done:false}] });
            saveActiveWorkout(); renderActive();
        }
        function delActiveEx(i) { if(confirm('¿Quitar?')) { activeWk.exercises.splice(i,1); saveActiveWorkout(); renderActive(); } }
        
        // HÁPTICO AL MARCAR
        function toggleDone(i, s) {
            let set = activeWk.exercises[i].sets[s];
            set.done = !set.done;
            if(set.done && navigator.vibrate) navigator.vibrate(40);
            saveActiveWorkout(); renderActive();
        }

        function finishWorkout() {
            let validEx = activeWk.exercises.map(e => ({ name: e.name, isUnilateral: e.isUnilateral, sets: e.sets.filter(s => s.wL !== '' || s.rL !== '') })).filter(e => e.sets.length > 0);
            if(validEx.length === 0) return alert('No hay series anotadas');
            
            historyData.push({
                id: activeWk.id, name: activeWk.name, date: new Date().toLocaleDateString('es-ES'),
                duration: Math.floor((Date.now() - activeWk.start)/60000), exercises: validEx
            });
            localStorage.setItem('ironlog_history', JSON.stringify(historyData));
            activeWk = null; saveActiveWorkout(); clearInterval(timerInt);
            document.getElementById('timerBanner').style.display = 'none';
            renderHistory(); switchView('History');
        }
        function cancelWorkout() { if(confirm('¿Borrar entreno actual?')) { activeWk = null; saveActiveWorkout(); clearInterval(timerInt); document.getElementById('timerBanner').style.display = 'none'; switchView('Templates'); } }

        // --- HISTORIAL E IA ---
        function renderHistory() {
            const c = document.getElementById('historyContainer'); c.innerHTML = '';
            [...historyData].reverse().forEach(w => {
                let lis = w.exercises.map(e => {
                    let sts = e.sets.map(s => e.isUnilateral ? `(I:${s.wL}x${s.rL}/D:${s.wR}x${s.rR})` : `${s.wL}kg x ${s.rL}`).join(', ');
                    return `<li style="margin-left:16px; font-size:13px; margin-bottom:4px;"><strong>${e.name}:</strong> ${sts}</li>`;
                }).join('');
                
                c.innerHTML += `
                <div class="card">
                    <div class="flex-between" style="margin-bottom:8px; align-items:flex-start;">
                        <div>
                            <strong style="color:var(--accent);">${w.name}</strong>
                            <div style="font-size:12px; color:var(--text-muted);">${w.date} | ${w.duration} min</div>
                        </div>
                        <div class="gap-2">
                            <button class="btn-mini" style="border-color:var(--accent); color:var(--accent);" onclick="copyToAI('${w.id}')">🤖 IA</button>
                            <button class="btn-mini" style="color:#e74c3c;" onclick="delHistory('${w.id}')">✕</button>
                        </div>
                    </div>
                    <ul>${lis}</ul>
                </div>`;
            });
        }
        function delHistory(id) { if(confirm('¿Borrar?')) { historyData = historyData.filter(h => h.id !== id); localStorage.setItem('ironlog_history', JSON.stringify(historyData)); renderHistory(); } }
        
        function copyToAI(id) {
            let w = historyData.find(x => x.id === id);
            let txt = `Entrenamiento: ${w.name} (${w.date})\nDuración: ${w.duration} min\n\n`;
            w.exercises.forEach(e => {
                txt += `- ${e.name}:\n`;
                e.sets.forEach((s, i) => {
                    txt += e.isUnilateral ? `  S${i+1}: Izq ${s.wL}kg x ${s.rL} | Der ${s.wR}kg x ${s.rR}\n` : `  S${i+1}: ${s.wL}kg x ${s.rL}\n`;
                });
            });
            txt += `\nAnaliza este entrenamiento (sobrecarga y volumen) y dame recomendaciones.`;
            navigator.clipboard.writeText(txt).then(() => alert('Copiado. Pégalo en ChatGPT/Claude.'));
        }

        // --- PROGRESO NATIVO ---
        function updateProgressSelectors() {
            let names = new Set(); historyData.forEach(w => w.exercises.forEach(e => names.add(e.name)));
            const sel = document.getElementById('progExSelect'); sel.innerHTML = '';
            if(names.size === 0) sel.innerHTML = '<option>Sin datos</option>';
            else Array.from(names).sort().forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
        }

        function drawNativeChart() {
            const exName = document.getElementById('progExSelect').value;
            const metric = document.getElementById('progMetricSelect').value;
            const c = document.getElementById('nativeChart'); c.innerHTML = '';
            
            if(!exName || exName === 'Sin datos') return;

            let pts = [], maxV = 0;
            historyData.forEach(w => {
                let ex = w.exercises.find(x => x.name === exName);
                if(ex && ex.sets.length > 0) {
                    let best = 0;
                    ex.sets.forEach(s => {
                        let wl = Number(s.wL)||0, rl = Number(s.rL)||0, wr = Number(s.wR)||0, rr = Number(s.rR)||0;
                        let val = 0;
                        if(metric === 'top') val = ex.isUnilateral ? Math.max(wl, wr) : wl;
                        else val = ex.isUnilateral ? Math.max(wl*(1+rl/30), wr*(1+rr/30)) : wl*(1+rl/30);
                        if(val > best) best = val;
                    });
                    if(best > 0) {
                        pts.push({ d: w.date, v: Math.round(best*10)/10 });
                        if(best > maxV) maxV = best;
                    }
                }
            });

            if(pts.length === 0) { c.innerHTML = '<div style="color:var(--text-muted);text-align:center;">Sin registros numéricos.</div>'; return; }

            pts.forEach(p => {
                let pct = (p.v / maxV) * 100;
                c.innerHTML += `
                <div class="chart-row">
                    <div class="chart-label">${p.d}</div>
                    <div class="chart-track">
                        <div class="chart-bar" style="width: ${pct}%;"></div>
                        <div class="chart-value">${p.v} Kg</div>
                    </div>
                </div>`;
            });
        }
    </script>
</body>
</html>
